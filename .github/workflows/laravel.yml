name: CI/CD fullstack Docker Application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  
  # ====================================
  # Executer les test du backend Laravel
  #=====================================
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Utilisation de PHP
        uses: shivammathur/setup-php@v2
        with:
            php-version: 8.4 
            coverage: xdebug

      - name: Installer dependances
        working-directory: backend
        run: |
          composer install --no-progress --prefer-dist

      - name: Copy .env
        working-directory: backend
        run: cp .env.example .env

      - name: genere clé
        working-directory: backend
        run: php artisan key:generate

      - name: Executer les tests de couverture
        working-directory: backend
        run: php artisan test --coverage-clover=coverage.xml

      - name: Uploader le coverage
        uses: actions/upload-artifact@v4
        with: 
          name: backend-coverage
          path: backend/coverage.xml
          


  # ====================================
  # Executer les test du frontend + corverage
  #=====================================   
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Utilisation de Node
        uses: actions/setup-node@v6
        with:
            node-version: 20

      - name: Installer les dependances
        working-directory: frontend
        run: npm install

      - name: Executer les tests avec couverture
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false

      - name: Uploader coverage
        uses: actions/upload-artifact@v4
        with: 
          name: frontend-coverage
          path: frontend/coverage


  

  # ====================================
  # # Sonarqube + qualité gate
  # #=====================================  
  sonar:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:  
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          path: .

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  
      # - name: Sonarqube code Qualité
      #   uses: sonarSource/sonarqube-quality-gate-action@v1
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  # ====================================
  # # SAST (code Security Scan)
  # #=====================================  
  stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Exécuter SAST 
        uses: AppThreat/sast-scan-action@master



    
  # ====================================
  # builder Docker iimages
  #=====================================  
  build-and-push:
    runs-on: ubuntu-latest
    needs: [sonar, stats]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6    
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Set tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Builder image laravel
        run: docker build -t $DOCKER_USERNAME/laravel-api:$TAG . ./backend

      - name: Builder image frontend
        run: docker build -t $DOCKER_USERNAME/react-frontend:$TAG ./frontend

      # Scan juste après build
      - name: Scan image laravel
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/laravel-api:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Scan image frontend
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/react-frontend:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

     

      - name: Pusher les images
        run: |
         docker push $DOCKER_USERNAME/laravel-api:$TAG
         docker push $DOCKER_USERNAME/react-frontend:$TAG



      
    


