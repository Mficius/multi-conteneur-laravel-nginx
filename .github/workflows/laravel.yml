name: CI/CD fullstack Docker Application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  
  # ====================================
  # Executer les test du backend Laravel
  #=====================================
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Utilisation de PHP
        uses: shivammathur/setup-php@v2
        with:
            php-version: 8.4 
            coverage: xdebug

      - name: Installer dependances
        working-directory: backend
        run: |
          composer install --no-progress --prefer-dist

      - name: Copy .env
        working-directory: backend
        run: cp .env.example .env

      - name: genere clé
        working-directory: backend
        run: php artisan key:generate

      - name: Executer les tests de couverture
        working-directory: backend
        run: php artisan test --coverage-clover=coverage.xml

      - name: Uploader le coverage
        uses: actions/upload-artifact@v4
        with: 
          name: backend-coverage
          path: backend/coverage.xml
          


  # ====================================
  # Executer les test du frontend + corverage
  #=====================================   
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Utilisation de Node
        uses: actions/setup-node@v6
        with:
            node-version: 20

      - name: Installer les dependances
        working-directory: frontend
        run: npm install

      - name: Executer les tests avec couverture
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false

      - name: Uploader coverage
        uses: actions/upload-artifact@v4
        with: 
          name: frontend-coverage
          path: frontend/coverage


  

  # ====================================
  # # Sonarqube + qualité gate
  # #=====================================  
  sonar:
    runs-on: ubtuntu-latest
    needs: [backend-tests, frontend-tests]

    steps: 
      - uses: actions/checkout@4

      - name: SonarQube Scan
        uses: sonarSource/sonarqube-scan-action@v2
        env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            SONAR_HOST_URL:  ${{ secrets.SONAR_HOST_URL }}


      - name: Sonarqube code Qualité
        uses: sonarSource/sonarque-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


          
    
