name: CI/CD fullstack Docker Application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  
  # ====================================
  # Executer les test du backend Laravel
  #=====================================
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Utilisation de PHP
        uses: shivammathur/setup-php@v2
        with:
            php-version: 8.4shivammathur 

      - name: Installer dependances
        working-directory: backend
        run: |
          composer install --no-progress --prefer-dist

      - name: Copy .env
        working-directory: backend
        run: cp .env.example .env

      - name: genere clé
        working-directory: backend
        run: php artisan key:generate

      - name: Executer les tests
        working-directory: backend
        run: php artisan test


  # ====================================
  # Executer les test du backend Laravel
  #=====================================   
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Utilisation de Node
        uses: actions/setup-node@v6
        with:
            node-version: 20

      - name: Installer les dependances
        working-directory: frontend
        run: npm install

      # - name: Executer les tests
      #   working-directory: frontend
      #   run: npm test -- --watchAll=false

    
  # ====================================
  # builder & push Docker iimages
  #=====================================  
  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # - name: Login to Docker Hub
      #   uses: docker/login-action@v4
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      # login Docker hub
      # - name: Connexion au Docker hub
      #   run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}"

      - name: Connexion au Docker hub
        run: echo "EngLab20206$" | docker login -u cloudopsenglab 



      # -------------
      # Backend images
      #----------------
      - name: Builder image laravel
        run: |
          docker build -t cloudopsenglab/laravel-api:latest ./backend

      - name: Tager mon image laravel
        run: |
          docker tag cloudopsenglab/laravel-api:latest  cloudopsenglab/laravel-api:${{ github.sha }}

      - name: Push Laravel image
        run: |
          docker push cloudopsenglab/laravel-api:latest
          docker push cloudopsenglab/laravel-api:${{ github.sha }}

